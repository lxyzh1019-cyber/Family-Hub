<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Family Hub — Chen household</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@10..48,400;10..48,500;10..48,600;10..48,700&family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-screen-label="Family Hub">
  <div id="root"></div>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="header.jsx"></script>
  <script type="text/babel" src="today.jsx"></script>
  <script type="text/babel" src="grid.jsx"></script>
  <script type="text/babel" src="quick.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#E85D5D",
      "density": "cozy",
      "layout": "byCategory",
      "featured": true,
      "darkMode": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        document.documentElement.classList.toggle("dark", tweaks.darkMode);
      }, [tweaks.darkMode]);

      useEffect(() => {
        document.documentElement.style.setProperty("--cat-training", tweaks.accent);
      }, [tweaks.accent]);

      return (
        <>
          <main className={`hub ${tweaks.density === "cozy" ? "is-cozy" : ""}`}>
            <HubHeader tweaks={tweaks} />
            <TodayPanel />
            <QuickActions />
            <AppGrid tweaks={tweaks} />
          </main>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Theme" />
            <TweakColor
              label="Accent"
              value={tweaks.accent}
              onChange={v => setTweak("accent", v)}
            />
            <TweakToggle
              label="Dark mode"
              value={tweaks.darkMode}
              onChange={v => setTweak("darkMode", v)}
            />

            <TweakSection label="Layout" />
            <TweakRadio
              label="Group by"
              value={tweaks.layout}
              onChange={v => setTweak("layout", v)}
              options={[
                { value: "byCategory", label: "Category" },
                { value: "byOwner",    label: "Person" },
              ]}
            />
            <TweakRadio
              label="Density"
              value={tweaks.density}
              onChange={v => setTweak("density", v)}
              options={[
                { value: "comfortable", label: "Comfy" },
                { value: "cozy",        label: "Cozy" },
              ]}
            />
            <TweakToggle
              label="Featured callout"
              value={tweaks.featured}
              onChange={v => setTweak("featured", v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
